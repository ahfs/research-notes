        end_date: 2024
        summary: "Built and managed the R&D organization consisting of teams of AI researchers, data scientists, ML Engineers, MLOps and annotators. Led to Arteria being named as the Most Promising 100 AI Startups by CB Insights and one of the 3 Coolest GenAI startups in FinTech by Gartner in 2023."
        highlights:
          - "Led the end-to-end design and building of CUCINA: an enterprise-grade, compliance-ready multimodal document understanding system for regulated financial services."
